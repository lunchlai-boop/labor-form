<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勞務報酬單填寫系統 - 岳沐藝文</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .page-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .page-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #1a1a1a;
  }
  .card {
    background: #fff;
    border: 1.5px solid #d4b87a;
    border-radius: 6px;
    max-width: 820px;
    margin: 0 auto 24px;
    padding: 28px 32px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #9a7c3f;
    border-bottom: 1.5px solid #d4b87a;
    padding-bottom: 10px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 24px;
  }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 13px;
    color: #666;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .field label span.req { color: #c0392b; margin-left: 2px; }
  .field input, .field textarea {
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    background: #fafaf8;
    transition: border-color 0.2s;
    outline: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: #d4b87a;
    background: #fff;
  }
  .amount-section {
    background: #fdf8ee;
    border: 1px solid #e8d49a;
    border-radius: 4px;
    padding: 18px 20px;
    margin-top: 16px;
  }
  .amount-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px 20px;
    align-items: end;
  }
  .amount-result {
    background: #1a1a1a;
    color: #d4b87a;
    border-radius: 4px;
    padding: 10px 14px;
    text-align: center;
    font-weight: 700;
    font-size: 15px;
  }
  .amount-result span { display: block; font-size: 11px; color: #aaa; font-weight: 400; margin-bottom: 3px; }
  .notice-box {
    background: #fff8f0;
    border-left: 3px solid #e67e22;
    padding: 12px 14px;
    font-size: 12.5px;
    color: #7a5020;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  /* 身分證上傳區 */
  .id-upload-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }
  .upload-zone {
    border: 2px dashed #d4b87a;
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    background: #fafaf8;
    position: relative;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .upload-zone:hover { background: #fdf8ee; }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-zone .zone-label { font-size: 13px; color: #888; }
  .upload-zone .zone-icon { font-size: 26px; color: #d4b87a; }
  .upload-zone img.preview {
    max-width: 100%; max-height: 120px; object-fit: contain; border-radius: 4px;
  }
  /* 簽名區 */
  .signature-area {
    margin-top: 16px;
  }
  .sig-canvas-wrap {
    border: 1.5px solid #ccc;
    border-radius: 4px;
    background: #fff;
    position: relative;
    touch-action: none;
  }
  .sig-canvas-wrap canvas {
    display: block;
    width: 100%;
    height: 140px;
    cursor: crosshair;
    border-radius: 4px;
  }
  .sig-tools {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    justify-content: flex-end;
  }
  .btn {
    padding: 9px 20px;
    border-radius: 3px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-outline {
    background: #fff;
    border: 1.5px solid #d4b87a;
    color: #9a7c3f;
  }
  .btn-dark {
    background: #1a1a1a;
    color: #d4b87a;
  }
  .btn-generate {
    background: #d4b87a;
    color: #1a1a1a;
    font-size: 15px;
    padding: 13px 36px;
    width: 100%;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 8px;
  }
  .actions {
    max-width: 820px;
    margin: 0 auto;
  }
  /* 手機響應式 */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .amount-grid { grid-template-columns: 1fr 1fr; }
    .id-upload-section { grid-template-columns: 1fr; }
    .card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>岳沐藝文 勞務報酬單</h1>
  <div style="font-size:13px;color:#9a7c3f;letter-spacing:1px;margin-top:4px;">Million Dollar Tips Entertainment</div>
</div>

<!-- 公司資訊 -->
<div class="card">
  <div class="card-title">委託方資訊（甲方）</div>
  <div class="form-grid">
    <div class="field">
      <label>公司名稱</label>
      <input type="text" id="company_name" value="岳沐藝文股份有限公司" readonly style="background:#f0f0ec;color:#555;">
    </div>
    <div class="field">
      <label>統一編號</label>
      <input type="text" id="company_tax" value="93712145" readonly style="background:#f0f0ec;color:#555;">
    </div>
    <div class="field">
      <label>聯絡電話</label>
      <input type="text" id="company_phone" value="0923392397" readonly style="background:#f0f0ec;color:#555;">
    </div>
    <div class="field">
      <label>公司地址</label>
      <input type="text" id="company_addr" value="台北市信義區忠孝東路五段1-8號2樓" readonly style="background:#f0f0ec;color:#555;">
    </div>
  </div>
</div>

<!-- 受僱者資訊 -->
<div class="card">
  <div class="card-title">受僱者資訊（乙方）</div>
  <div class="form-grid">
    <div class="field">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="name" placeholder="請輸入真實姓名">
    </div>
    <div class="field">
      <label>身分證字號 <span class="req">*</span></label>
      <input type="text" id="id_num" placeholder="A123456789" maxlength="10">
    </div>
    <div class="field">
      <label>聯絡電話 <span class="req">*</span></label>
      <input type="tel" id="phone" placeholder="09XX-XXX-XXX">
    </div>
    <div class="field">
      <label>專案執行日期</label>
      <input type="date" id="project_date" placeholder="專案執行日期（非必填）">
    </div>
    <div class="field">
      <label>日期</label>
      <input type="date" id="date">
    </div>
    <div class="field full" style="grid-column:1/-1;">
      <label>戶籍地址 <span class="req">*</span></label>
      <input type="text" id="address" placeholder="請輸入完整戶籍地址" oninput="syncMailAddr()">
    </div>
    <div class="field full" style="grid-column:1/-1;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
        <label style="margin:0;">通訊地址</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#9a7c3f;cursor:pointer;font-weight:600;">
          <input type="checkbox" id="same_addr" onchange="toggleSameAddr()" style="accent-color:#d4b87a;width:14px;height:14px;">
          同戶籍地址
        </label>
      </div>
      <input type="text" id="mail_address" placeholder="請輸入通訊地址（若與戶籍相同請勾選）">
    </div>
  </div>
</div>

<!-- 報酬資訊 -->
<div class="card">
  <div class="card-title">報酬資訊</div>
  <div class="notice-box">
    ※ 依各類所得扣繳辦法，每月次扣繳稅額 ≦ 2,000 元得不扣繳。<br>
    ※ 領取金額單筆超過 29,500 元（115年基本工資），需代扣二代健保 2.11%。<br>
    ※ 有加保工會者，<strong>免扣二代健保</strong>。<br>
    ※ 綜合所得稅類別：<strong>9A 執行業務所得（10%）</strong>
  </div>

  <!-- 工會問題 -->
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:18px;padding:14px 16px;background:#fdf8ee;border:1px solid #e8d49a;border-radius:4px;">
    <span style="font-size:14px;font-weight:700;color:#1a1a1a;letter-spacing:0.5px;">是否有保工會？</span>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;font-weight:600;color:#1a1a1a;">
      <input type="radio" name="union" id="union_yes" value="yes" onchange="calcAmount()" style="accent-color:#d4b87a;width:17px;height:17px;">
      是（免扣二代健保）
    </label>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;font-weight:600;color:#1a1a1a;">
      <input type="radio" name="union" id="union_no" value="no" onchange="calcAmount()" checked style="accent-color:#d4b87a;width:17px;height:17px;">
      否
    </label>
    <span id="union_badge" style="display:none;margin-left:6px;background:#27ae60;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.5px;">免扣健保</span>
  </div>

  <div class="amount-section">
    <div class="amount-grid">
      <div class="field">
        <label>所得金額（元）<span class="req">*</span></label>
        <input type="number" id="income" placeholder="例：30000" oninput="calcAmount()">
      </div>
      <div class="field">
        <label>扣繳金額（元）</label>
        <input type="number" id="tax" placeholder="自動計算" readonly style="background:#f0f0ec;">
      </div>
      <div class="field">
        <label>二代健保（元）</label>
        <input type="number" id="health" placeholder="自動計算" readonly style="background:#f0f0ec;">
      </div>
      <div>
        <div class="amount-result">
          <span>實發金額</span>
          <span id="net_display">$ 0</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 身分證上傳 -->
<div class="card">
  <div class="card-title">身分證影本</div>
  <div class="id-upload-section">
    <div>
      <div style="font-size:13px;color:#666;margin-bottom:8px;font-weight:600;">正面</div>
      <div class="upload-zone" id="front_zone">
        <input type="file" id="id_front" accept="image/*" onchange="previewID(this,'front_preview','front_zone')">
        <div class="zone-icon">🪪</div>
        <div class="zone-label">點擊或拍照上傳<br>身分證正面</div>
        <img class="preview" id="front_preview" style="display:none;">
      </div>
    </div>
    <div>
      <div style="font-size:13px;color:#666;margin-bottom:8px;font-weight:600;">反面</div>
      <div class="upload-zone" id="back_zone">
        <input type="file" id="id_back" accept="image/*" onchange="previewID(this,'back_preview','back_zone')">
        <div class="zone-icon">🪪</div>
        <div class="zone-label">點擊或拍照上傳<br>身分證反面</div>
        <img class="preview" id="back_preview" style="display:none;">
      </div>
    </div>
  </div>
</div>

<!-- 領款人簽名 -->
<div class="card">
  <div class="card-title">領款人簽收</div>
  <div class="signature-area">
    <div style="font-size:13px;color:#666;margin-bottom:8px;">請在下方空白處手寫簽名</div>
    <div class="sig-canvas-wrap">
      <canvas id="sigCanvas"></canvas>
    </div>
    <div class="sig-tools">
      <button class="btn btn-outline" onclick="clearSig()">清除重簽</button>
    </div>
  </div>
</div>

<!-- 產生按鈕 -->
<div class="actions">
  <button class="btn btn-generate" onclick="generatePDF()">📄 產生勞報單 PDF</button>
</div>

<script>
// ===== 日期預設今天 =====
document.getElementById('date').valueAsDate = new Date();

// ===== 通訊地址同戶籍 =====
function syncMailAddr() {
  if (document.getElementById('same_addr').checked) {
    document.getElementById('mail_address').value = document.getElementById('address').value;
  }
}
function toggleSameAddr() {
  const checked = document.getElementById('same_addr').checked;
  const mailEl = document.getElementById('mail_address');
  if (checked) {
    mailEl.value = document.getElementById('address').value;
    mailEl.readOnly = true;
    mailEl.style.background = '#f0f0ec';
  } else {
    mailEl.readOnly = false;
    mailEl.style.background = '#fafaf8';
  }
}

// ===== 金額計算 =====
function calcAmount() {
  const income = parseFloat(document.getElementById('income').value) || 0;
  const MIN_WAGE = 29500;
  const hasUnion = document.getElementById('union_yes').checked;
  const badge = document.getElementById('union_badge');
  let tax = 0, health = 0;
  // 扣繳稅：10%，但稅額<=2000免扣
  const rawTax = Math.floor(income * 0.1);
  tax = rawTax > 2000 ? rawTax : 0;
  // 二代健保：有保工會免扣；否則超過29500才扣
  if (!hasUnion) {
    health = income > MIN_WAGE ? Math.floor(income * 0.0211) : 0;
  }
  badge.style.display = hasUnion ? 'inline-block' : 'none';
  const net = income - tax - health;
  document.getElementById('tax').value = tax || '';
  document.getElementById('health').value = health || '';
  document.getElementById('net_display').textContent = '$ ' + net.toLocaleString();
}

// ===== 身分證預覽 =====
function previewID(input, previewId, zoneId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(previewId);
    const zone = document.getElementById(zoneId);
    img.src = e.target.result;
    img.style.display = 'block';
    zone.querySelector('.zone-icon').style.display = 'none';
    zone.querySelector('.zone-label').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ===== 手寫簽名 =====
const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
let drawing = false, lastX = 0, lastY = 0;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const savedData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; });
canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
  lastX = p.x; lastY = p.y;
});
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y;
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
  lastX = p.x; lastY = p.y;
}, {passive: false});
canvas.addEventListener('touchend', () => drawing = false);

function clearSig() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===== 產生 PDF =====
async function generatePDF() {
  // 驗證必填
  const required = [
    ['name', '姓名'], ['id_num', '身分證字號'], ['phone', '聯絡電話'],
    ['address', '戶籍地址'], ['income', '所得金額']
  ];
  for (const [id, label] of required) {
    if (!document.getElementById(id).value.trim()) {
      alert('請填寫：' + label); return;
    }
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const W = 210, H = 297;
  const M = 20; // margin

  doc.rect(0, 0, W, H, 'F');

  // 邊框
  doc.setDrawColor(212, 184, 122);
  doc.setLineWidth(0.8);
  doc.rect(M - 5, M - 5, W - 2*(M-5), H - 2*(M-5), 'S');

  // Logo 圖片
  // ===== 浮水印 (透明度50%) =====

  doc.setDrawColor(212, 184, 122);
  doc.setLineWidth(0.8);
  doc.line(M, M + 31, W - M, M + 31);
  doc.setLineWidth(0.3);
  doc.line(M, M + 33, W - M, M + 33);

  // 取值
  const name        = document.getElementById('name').value;
  const id_num      = document.getElementById('id_num').value;
  const phone       = document.getElementById('phone').value;
  const date        = document.getElementById('date').value;
  const project_date = document.getElementById('project_date').value;
  const addr        = document.getElementById('address').value;
  const mail_addr   = document.getElementById('mail_address').value || addr;
  const income = parseFloat(document.getElementById('income').value) || 0;
  const tax    = parseFloat(document.getElementById('tax').value) || 0;
  const health = parseFloat(document.getElementById('health').value) || 0;
  const net    = income - tax - health;
  const hasUnion = document.getElementById('union_yes').checked;
  const unionText = hasUnion ? 'Yes (Exempt from Suppl. Ins.)' : 'No';

  // 輔助函式：畫表格列
  let y = M + 40;
  const col1 = M, col2 = M + 38, col3 = M + 118, col4 = M + 152;

  function drawRow(label1, val1, label2, val2) {
    doc.setFontSize(9);
    doc.setTextColor(120, 100, 60);
    doc.setFont(undefined, 'normal');
    doc.text(label1, col1, y);
    doc.setTextColor(26, 26, 26);
    doc.setFont(undefined, 'bold');
    doc.text(String(val1), col2, y);
    if (label2) {
      doc.setTextColor(120, 100, 60);
      doc.setFont(undefined, 'normal');
      doc.text(label2, col3, y);
      doc.setTextColor(26, 26, 26);
      doc.setFont(undefined, 'bold');
      doc.text(String(val2), col4, y);
    }
    y += 8;
  }

  doc.setFont(undefined, 'bold');
  doc.setFontSize(10);
  doc.setTextColor(154, 124, 63);
  doc.text('>> 受僱者資訊 Payee Information', col1, y - 2);
  y += 6;

  drawRow('姓名 Name:', name, '日期 Date:', date || '—');
  drawRow('身分證 ID:', id_num, '專案日期:', project_date || '—');
  drawRow('電話 Phone:', phone, '工會 Union:', unionText);
  doc.setFontSize(9);
  doc.setTextColor(120, 100, 60);
  doc.setFont(undefined, 'normal');
  doc.text('戶籍地址:', col1, y);
  doc.setTextColor(26, 26, 26);
  doc.setFont(undefined, 'bold');
  const addrDisplay = addr.length > 40 ? addr.substring(0, 40) + '...' : addr;
  doc.text(addrDisplay, col2, y);
  y += 7;
  doc.setTextColor(120, 100, 60);
  doc.setFont(undefined, 'normal');
  doc.text('通訊地址:', col1, y);
  doc.setTextColor(26, 26, 26);
  doc.setFont(undefined, 'bold');
  const mailDisplay = mail_addr.length > 40 ? mail_addr.substring(0, 40) + '...' : mail_addr;
  doc.text(mailDisplay, col2, y);
  y += 10;

  // 金額區塊
  doc.setFillColor(26, 26, 26);
  doc.rect(M, y, W - 2*M, 34, 'F');

  doc.setTextColor(212, 184, 122);
  doc.setFontSize(8.5);
  doc.setFont(undefined, 'normal');
  const bx = M + 5;
  doc.text('Income', bx, y + 7);
  doc.text('Tax (10%)', bx + 42, y + 7);
  doc.text('Suppl. Ins.', bx + 84, y + 7);
  doc.text('Net Amount', bx + 128, y + 7);

  doc.setFontSize(12);
  doc.setFont(undefined, 'bold');
  doc.text('$ ' + income.toLocaleString(), bx, y + 18);
  doc.text('- ' + tax.toLocaleString(), bx + 42, y + 18);
  doc.text(hasUnion ? 'Exempt' : '- ' + health.toLocaleString(), bx + 84, y + 18);

  doc.setFontSize(14);
  doc.setTextColor(255, 220, 120);
  doc.text('$ ' + net.toLocaleString(), bx + 128, y + 20);

  doc.setTextColor(130, 130, 130);
  doc.setFontSize(7);
  doc.setFont(undefined, 'normal');
  doc.text('(exempt if tax<=2,000)', bx + 42, y + 27);
  doc.text(hasUnion ? '(Union insured)' : '(2.11% if >29,500)', bx + 84, y + 27);
  doc.text('9A Category', bx + 128, y + 27);

  y += 42;

  // 身分證影像
  const frontFile = document.getElementById('id_front').files[0];
  const backFile  = document.getElementById('id_back').files[0];

  doc.setFont(undefined, 'bold');
  doc.setFontSize(10);
  doc.setTextColor(154, 124, 63);
  doc.text('>> ID Card Copy', col1, y);
  y += 5;

  doc.setDrawColor(200, 170, 100);
  doc.setLineWidth(0.4);
  const idW = (W - 2*M - 6) / 2, idH = 36;

  if (frontFile) {
    const frontData = await fileToDataURL(frontFile);
    try { doc.addImage(frontData, 'JPEG', M, y, idW, idH, undefined, 'FAST'); } catch(e) {}
    doc.rect(M, y, idW, idH, 'S');
    doc.setFontSize(7); doc.setTextColor(120,100,60);
    doc.text('Front', M + 2, y + idH - 1.5);
  } else {
    doc.setDrawColor(180,160,100); doc.rect(M, y, idW, idH, 'S');
    doc.setFontSize(8); doc.setTextColor(160,140,100);
    doc.text('Front (not provided)', M + idW/2, y + idH/2, {align:'center'});
  }

  if (backFile) {
    const backData = await fileToDataURL(backFile);
    try { doc.addImage(backData, 'JPEG', M + idW + 6, y, idW, idH, undefined, 'FAST'); } catch(e) {}
    doc.rect(M + idW + 6, y, idW, idH, 'S');
    doc.setFontSize(7); doc.setTextColor(120,100,60);
    doc.text('Back', M + idW + 8, y + idH - 1.5);
  } else {
    doc.setDrawColor(180,160,100); doc.rect(M + idW + 6, y, idW, idH, 'S');
    doc.setFontSize(8); doc.setTextColor(160,140,100);
    doc.text('Back (not provided)', M + idW + 6 + idW/2, y + idH/2, {align:'center'});
  }

  y += idH + 8;

  // 簽名區
  doc.setFont(undefined, 'bold');
  doc.setFontSize(10);
  doc.setTextColor(154, 124, 63);
  doc.text('>> Signature  /  領款人簽收', col1, y);
  y += 4;

  // 計算簽名框高度：讓所有內容剛好塞進A4
  // A4 高度 297, 底部 margin 15, 頁腳 10
  const footerY = H - 15;
  const sigH = Math.max(20, footerY - y - 14);

  // 簽名是否為空
  const tempCtx = canvas.getContext('2d');
  const pixelData = tempCtx.getImageData(0, 0, canvas.width, canvas.height).data;
  const hasSignature = Array.from(pixelData).some(v => v > 0);

  if (hasSignature) {
    const sigData = canvas.toDataURL('image/png');
    doc.addImage(sigData, 'PNG', M, y, W - 2*M, sigH);
  }
  doc.setDrawColor(200, 170, 100);
  doc.setLineWidth(0.4);
  doc.rect(M, y, W - 2*M, sigH, 'S');

  y += sigH + 4;

  // 頁腳聲明（固定在底部）
  doc.setFont(undefined, 'normal');
  doc.setFontSize(7);
  doc.setTextColor(140, 120, 80);
  doc.text('此表單依各類所得扣繳辦法製作。所得類別：9A執行業務所得。', W/2, footerY, {align:'center'});
  doc.text('Prepared in accordance with withholding tax regulations. | 岳沐藝文股份有限公司', W/2, footerY + 4.5, {align:'center'});

  // 下載
  const safeName = name.replace(/[^a-zA-Z一-鿿]/g, '') || 'payee';
  const fileDate = date || project_date || new Date().toISOString().slice(0,10);
  doc.save('勞務報酬單_' + safeName + '_' + fileDate + '.pdf');
}

function fileToDataURL(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
